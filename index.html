<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KODA ARP 12기</title>
    
    <link rel="apple-touch-icon" href="logo-koda.jpg">
    <link rel="icon" href="logo-koda.jpg">
    <meta name="theme-color" content="#002d56">
    <meta name="apple-mobile-web-app-status-bar-style" content="#002d56">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #002d56; --sub-navy: #1a3a5a; --gold: #D4AF37; --bg: #f5f5f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding-bottom: 75px; overflow-x: hidden; }
        .app-container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; }
        
        .header { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 2px solid var(--navy); background: #fff; position: sticky; top:0; z-index:100; }
        .logo { font-weight: 800; color: var(--navy); font-size: 1.2rem; cursor: pointer; }

        .page { display: none; padding-bottom: 30px; }
        .page.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 🚀 사진첩 전용 갤러리 그리드 스타일 */
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .gallery-item { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; }
        .gallery-thumb { width: 100%; aspect-ratio: 1 / 1; background: #f0f0f0; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-thumb i { font-size: 2.5rem; color: #ddd; }
        .gallery-info { padding: 10px; }
        .gallery-info h4 { font-size: 0.9rem; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gallery-info p { font-size: 0.75rem; color: #999; margin-top: 4px; }

        /* 공통 스타일 유지 */
        .cal-box { margin: 15px; background: var(--sub-navy); border-radius: 15px; padding: 15px 5px; color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; border-top: 1px solid rgba(255,255,255,0.1); border-left: 1px solid rgba(255,255,255,0.1); }
        .cal-grid div { height: 60px; display: flex; align-items: center; justify-content: center; font-size: 1rem; border-right: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); position: relative; cursor: pointer; }
        .cal-grid .monday { color: var(--gold); font-weight: bold; }
        .cal-grid .has-event::after { content: ""; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #fff; display: flex; height: 65px; border-top: 1px solid #ddd; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 0.65rem; cursor: pointer; }
        .nav-tab.active { color: var(--navy); font-weight: bold; }
        .nav-tab i { font-size: 1.3rem; margin-bottom: 3px; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-body { position: absolute; bottom: 0; width: 100%; max-width: 500px; background: #fff; border-top-left-radius: 25px; border-top-right-radius: 25px; padding: 25px; left: 50%; transform: translateX(-50%); max-height: 90vh; overflow-y: auto; }
        .modal-body img { width: 100%; border-radius: 12px; margin-bottom: 15px; }

        .post-card { background: #fff; border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo" onclick="showPage('main-page')">KODA-ARP</div>
            <div class="menu-btn" onclick="openWrite()"><i class="fas fa-pen-to-square"></i></div>
        </header>

        <div id="main-page" class="page active">
            <div class="visual" style="height:140px; background:var(--navy) url('main-bg.jpg') no-repeat center; background-size:cover;"></div>
            <div class="cal-box">
                <div class="cal-nav" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; color:var(--gold); padding:0 10px;">
                    <i class="fas fa-chevron-left" onclick="changeMonth(-1)"></i>
                    <span id="cal-month-title" style="font-weight:bold; font-size:1.2rem;">2026년 3월</span>
                    <i class="fas fa-chevron-right" onclick="changeMonth(1)"></i>
                </div>
                <div class="cal-grid" id="cal-grid-content"></div>
            </div>
            <nav style="display:grid; grid-template-columns:1fr 1fr; background:#ddd; gap:1px;">
                <div style="height:110px; background:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; cursor:pointer;" onclick="alert('준비중')"><i class="fas fa-university" style="font-size:1.8rem; color:var(--gold); margin-bottom:8px;"></i><strong>ARP소개</strong></div>
                <div style="height:110px; background:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; cursor:pointer;" onclick="showPage('board-page', '공지사항')"><i class="fas fa-bullhorn" style="font-size:1.8rem; color:var(--gold); margin-bottom:8px;"></i><strong>공지사항</strong></div>
                <div style="height:110px; background:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; cursor:pointer;" onclick="showPage('board-page', '학습자료')"><i class="fas fa-file-pdf" style="font-size:1.8rem; color:var(--gold); margin-bottom:8px;"></i><strong>학습자료</strong></div>
                <div style="height:110px; background:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; cursor:pointer;" onclick="showPage('board-page', '사진첩')"><i class="fas fa-camera" style="font-size:1.8rem; color:var(--gold); margin-bottom:8px;"></i><strong>사진첩</strong></div>
            </nav>
            <footer style="padding:25px; background:var(--navy); color:#fff; font-size:0.7rem; line-height:1.6; text-align:center;">
                KODA-ARP 최고위과정 12기 | TEL : 02-512-4750
            </footer>
        </div>

        <div id="board-page" class="page">
            <div style="padding:15px; background:var(--navy); color:#fff; display:flex; justify-content:space-between; align-items:center;">
                <span id="board-title">게시판</span>
                <div onclick="openWrite()" style="font-size:0.8rem; background:var(--gold); padding:4px 10px; border-radius:4px; cursor:pointer;">글쓰기</div>
            </div>
            <div id="board-list-content"></div>
        </div>

        <div id="member-page" class="page">
            <div style="padding:15px; background:#fff; border-bottom:4px solid var(--gold); position:sticky; top:52px; z-index:90;">
                <div style="background:#f1f3f5; padding:10px; border-radius:30px; display:flex; align-items:center;">
                    <i class="fas fa-search" style="margin-right:10px; color:#aaa;"></i>
                    <input type="text" id="m-search" placeholder="성함 또는 소속 검색" oninput="runSearch()" style="border:none; background:none; outline:none; width:100%;">
                </div>
                <div style="margin-top:10px; font-size:0.85rem; font-weight:bold; color:var(--navy);">총 <span id="m-count">60</span>명</div>
            </div>
            <div id="member-list"></div>
        </div>

        <div id="write-page" class="page">
            <div style="padding:15px; background:var(--navy); color:#fff; display:flex; justify-content:space-between; align-items:center;">
                <span id="write-title">등록하기</span>
                <div onclick="savePost()" style="font-size:0.8rem; background:var(--gold); padding:4px 10px; border-radius:4px; cursor:pointer;">저장</div>
            </div>
            <div style="padding:20px;">
                <input type="text" id="post-subject" placeholder="제목을 입력하세요." style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
                <textarea id="post-content" placeholder="내용을 입력하세요." style="width:100%; height:150px; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; resize:none;"></textarea>
                <div style="background:#f8f9fa; padding:15px; border-radius:8px; border:1px dashed #ccc; text-align:center; color:#666;">
                    <i class="fas fa-paperclip"></i> 파일명 입력 (예: 1주차 강의자료.pdf / 활동사진.jpg)<br>
                    <input type="text" id="file-name-input" placeholder="정확한 파일명 입력" style="width:100%; padding:10px; margin-top:10px; border:1px solid #ddd; border-radius:5px;">
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-tab active" onclick="showPage('main-page')"><i class="fas fa-home"></i><span>홈</span></div>
            <div class="nav-tab" onclick="showPage('member-page')"><i class="fas fa-id-card"></i><span>원우명단</span></div>
            <div class="nav-tab" onclick="showPage('board-page', '공지사항')"><i class="fas fa-bullhorn"></i><span>공지</span></div>
            <div class="nav-tab" onclick="showPage('board-page', '학습자료')"><i class="fas fa-file-alt"></i><span>학습자료</span></div>
            <div class="nav-tab" onclick="showPage('board-page', '사진첩')"><i class="fas fa-images"></i><span>사진첩</span></div>
        </nav>
    </div>

    <div id="detail-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-body" onclick="event.stopPropagation()">
            <div id="modal-image-wrap"></div>
            <h2 id="modal-view-title" style="color:var(--navy); font-size:1.1rem;"></h2>
            <div id="modal-view-content" style="margin-top:15px; line-height:1.6; white-space:pre-wrap; background:#f8f9fa; padding:15px; border-radius:10px;"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="deletePost()" style="flex:1; padding:12px; background:#ff8a80; border:none; border-radius:8px; color:#fff; font-weight:bold;">삭제</button>
                <button onclick="document.getElementById('detail-modal').style.display='none'" style="flex:1; padding:12px; background:var(--navy); border:none; border-radius:8px; color:#fff; font-weight:bold;">닫기</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_USER = "JOOWANKIM823"; 
        const GITHUB_REPO = "koda-arp"; 
        let currentBoard = '공지사항';
        let selectedId = null;

        // 원우 데이터 60명 (핵심 데이터 유지)
        const members = [
            { no: 1, name: "김구현", company: "케이알산업", pos: "상무", phone: "010-9401-8700", email: "kimkh@krindus.co.kr" },
            { no: 60, name: "홍창표", company: "유진투자증권", pos: "담당", phone: "010-9543-4445", email: "cphong@eugenefn.com" }
            // (이전에 드린 60명 전원 데이터가 이 자리에 들어갑니다)
        ];

        const curriculum = {
            "2026-03-16": { title: "1주차 강의", c1: "입학식", l1: "KODA 사무국", c2: "-", l2: "-" },
            "2026-03-23": { title: "2주차 강의", c1: "부동산트랜드와 주택 정책", l1: "진희선 교수", c2: "1학기 개강파티", l2: "원우회 주관" }
        };

        function getDB() { return JSON.parse(localStorage.getItem('arp_db') || '[]'); }
        function saveDB(db) { localStorage.setItem('arp_db', JSON.stringify(db)); }

        function savePost() {
            const sub = document.getElementById('post-subject').value;
            const con = document.getElementById('post-content').value;
            const fname = document.getElementById('file-name-input').value;
            if(!sub) return alert('제목을 입력하세요!');
            let db = getDB();
            db.unshift({ id: Date.now(), board: currentBoard, subject: sub, content: con, fileName: fname, date: new Date().toLocaleDateString() });
            saveDB(db); alert('저장되었습니다!'); showPage('board-page', currentBoard);
        }

        function drawBoard() {
            const list = document.getElementById('board-list-content');
            let posts = getDB().filter(p => p.board === currentBoard);
            
            if (currentBoard === '사진첩') {
                // 📸 갤러리형 레이아웃
                let html = '<div class="gallery-grid">';
                html += posts.map(p => {
                    const imgUrl = p.fileName ? `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${encodeURIComponent(p.fileName)}` : '';
                    return `
                        <div class="gallery-item" onclick="showPostDetail(${p.id})">
                            <div class="gallery-thumb">
                                ${p.fileName ? `<img src="${imgUrl}" onerror="this.innerHTML='<i class=\'fas fa-image\'></i>'; this.src='';">` : '<i class="fas fa-image"></i>'}
                            </div>
                            <div class="gallery-info">
                                <h4>${p.subject}</h4>
                                <p>${p.date}</p>
                            </div>
                        </div>
                    `;
                }).join('');
                html += '</div>';
                list.innerHTML = posts.length ? html : '<div style="padding:50px; text-align:center; color:#ccc;">사진을 등록해주세요.</div>';
            } else {
                // 📝 목록형 레이아웃 (공지, 학습자료)
                let html = "";
                if(currentBoard === '공지사항') {
                    html += Object.keys(curriculum).map(date => `<div class="post-card" onclick="showCurriculumDetail('${date}')"><div><h4>${curriculum[date].title}</h4><p style="font-size:0.8rem; color:#888;">${date} 강의안내</p></div><i class="fas fa-chevron-right" style="color:#ddd;"></i></div>`).join('');
                }
                html += posts.map(p => `<div class="post-card" onclick="showPostDetail(${p.id})"><div><h4>${p.subject}</h4><p style="font-size:0.8rem; color:#888;">${p.date} ${p.fileName ? '📎' : ''}</p></div><i class="fas fa-chevron-right" style="color:#ddd;"></i></div>`).join('');
                list.innerHTML = html || '<div style="padding:50px; text-align:center; color:#ccc;">글이 없습니다.</div>';
            }
        }

        function showPostDetail(id) {
            const p = getDB().find(i => i.id == id);
            selectedId = id;
            document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('modal-view-title').innerText = p.subject;
            document.getElementById('modal-view-content').innerText = p.content;
            const imgWrap = document.getElementById('modal-image-wrap');
            if(p.fileName && (p.fileName.match(/\.(jpg|jpeg|png|gif)$/i))) {
                imgWrap.innerHTML = `<img src="https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${encodeURIComponent(p.fileName)}">`;
            } else {
                imgWrap.innerHTML = "";
            }
        }

        function deletePost() {
            if(!confirm('삭제하시겠습니까?')) return;
            saveDB(getDB().filter(i => i.id != selectedId));
            document.getElementById('detail-modal').style.display = 'none';
            drawBoard();
        }

        function showPage(pageId, title = '') {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(title) { currentBoard = title; document.getElementById('board-title').innerText = title; }
            if(pageId === 'board-page') drawBoard();
            window.scrollTo(0,0);
        }

        function openWrite() {
            document.getElementById('post-subject').value = "";
            document.getElementById('post-content').value = "";
            document.getElementById('file-name-input').value = "";
            showPage('write-page');
        }

        // 달력 로직 등 기존 유지...
        window.onload = () => { /* drawCalendar(), drawMembers() 호출... */ drawBoard(); };
    </script>
</body>
</html>
