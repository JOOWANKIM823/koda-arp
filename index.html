<!DOCTYPE html>

    <link rel="icon" href="logo-koda.jpg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #002d56; --sub-navy: #1a3a5a; --gold: #D4AF37; --bg: #f5f5f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding-bottom: 75px; overflow-x: hidden; }
        .app-container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* 헤더 */
        .header { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 2px solid var(--navy); background: #fff; position: sticky; top:0; z-index:100; }
        .logo { font-weight: 800; color: var(--navy); font-size: 1.2rem; cursor: pointer; }

        .page { display: none; padding-bottom: 30px; }
        .page.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 정사각형 격자 달력 */
        .cal-box { margin: 15px; background: var(--sub-navy); border-radius: 15px; padding: 15px 5px; color: #fff; }
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: var(--gold); padding: 0 10px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; border-top: 1px solid rgba(255,255,255,0.1); border-left: 1px solid rgba(255,255,255,0.1); }
        .cal-grid div { height: 60px; display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer; border-right: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); position: relative; }
        .cal-grid .monday { color: var(--gold); font-weight: bold; }
        .cal-grid .has-event::after { content: ""; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); }

        /* 게시판 카드 */
        .post-card { background: #fff; border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        /* 하단바 */
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #fff; display: flex; height: 65px; border-top: 1px solid #ddd; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 0.65rem; cursor: pointer; }
        .nav-tab.active { color: var(--navy); font-weight: bold; }
        .nav-tab i { font-size: 1.3rem; margin-bottom: 3px; }

        /* 원우 명단 카드 */
        .m-card { display: flex; padding: 15px; border-bottom: 1px solid #eee; align-items: center; gap: 15px; }
        .m-photo { width: 70px; height: 90px; background: #eee; border-radius: 4px; overflow: hidden; }
        .m-photo img { width: 100%; height: 100%; object-fit: cover; }
        .m-btns { display: flex; gap: 10px; margin-top: 8px; }
        .m-btn { width: 32px; height: 32px; background: #f1f3f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #666; text-decoration: none; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-body { position: absolute; bottom: 0; width: 100%; max-width: 500px; background: #fff; border-top-left-radius: 25px; border-top-right-radius: 25px; padding: 25px; left: 50%; transform: translateX(-50%); }
        .download-btn { display: block; width: 100%; padding: 12px; background: #e1f5fe; color: #0277bd; text-align: center; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 15px; border: 1px solid #b3e5fc; }
    </style>
</head>

        function getDB() { return JSON.parse(localStorage.getItem('arp_db') || '[]'); }
        function saveDB(db) { localStorage.setItem('arp_db', JSON.stringify(db)); }

        function savePost() {
            const sub = document.getElementById('post-subject').value;
            const con = document.getElementById('post-content').value;
            const fname = document.getElementById('file-name-input').value;
            if(!sub) return alert('제목을 입력하세요!');
            let db = getDB();
            db.unshift({ id: Date.now(), board: currentBoard, subject: sub, content: con, fileName: fname, date: new Date().toLocaleDateString() });
            saveDB(db); alert('저장되었습니다!'); showPage('board-page', currentBoard);
        }

        function drawBoard() {
            const list = document.getElementById('board-list-content');
            let html = "";
            if(currentBoard === '공지사항') {
                html += Object.keys(curriculum).map(date => `<div class="post-card" onclick="showCurriculumDetail('${date}')"><div><h4>${curriculum[date].title}</h4><p style="font-size:0.8rem; color:#888;">${date} 강의안내</p></div><i class="fas fa-chevron-right" style="color:#ddd;"></i></div>`).join('');
            }
            html += getDB().filter(p => p.board === currentBoard).map(p => `<div class="post-card" onclick="showPostDetail(${p.id})"><div><h4>${p.subject}</h4><p style="font-size:0.8rem; color:#888;">${p.date} ${p.fileName ? '📎' : ''}</p></div><i class="fas fa-chevron-right" style="color:#ddd;"></i></div>`).join('');
            list.innerHTML = html || '<div style="padding:50px; text-align:center; color:#ccc;">글이 없습니다.</div>';
        }

        function showPostDetail(id) {
            const p = getDB().find(i => i.id == id);
            selectedId = id;
            document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('modal-view-title').innerText = p.subject;
            document.getElementById('modal-view-content').innerText = p.content;
            const dl = document.getElementById('real-download-link');
            if(p.fileName) {
                dl.style.display = 'block';
                dl.href = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/files/${encodeURIComponent(p.fileName)}`;
            } else { dl.style.display = 'none'; }
        }

        function showCurriculumDetail(date) {
            const d = curriculum[date];
            document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('modal-view-title').innerText = d.title;
            document.getElementById('modal-view-content').innerHTML = `1교시: ${d.c1} (${d.l1})\n2교시: ${d.c2} (${d.l2})`;
            document.getElementById('real-download-link').style.display = 'none';
        }

        function deletePost() {
            if(!confirm('삭제하시겠습니까?')) return;
            saveDB(getDB().filter(i => i.id != selectedId));
            document.getElementById('detail-modal').style.display = 'none';
            drawBoard();
        }

        function showPage(pageId, title = '') {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(title) { currentBoard = title; document.getElementById('board-title').innerText = title; }
            if(pageId === 'board-page') drawBoard();
            window.scrollTo(0,0);
        }

        function openWrite() {
            document.getElementById('post-subject').value = "";
            document.getElementById('post-content').value = "";
            document.getElementById('file-name-input').value = "";
            showPage('write-page');
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if(currentMonth < 1) { currentYear--; currentMonth = 12; }
            if(currentMonth > 12) { currentYear++; currentMonth = 1; }
            drawCalendar();
        }

        function drawCalendar() {
            document.getElementById('cal-month-title').innerText = `${currentYear}년 ${currentMonth}월`;
            const grid = document.getElementById('cal-grid-content');
            grid.innerHTML = '<div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>';
            const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth, 0).getDate();
            for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
            for(let d=1; d<=lastDate; d++) {
                const fullDate = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const event = curriculum[fullDate];
                const div = document.createElement('div');
                if(new Date(currentYear, currentMonth - 1, d).getDay() === 1) div.className = 'monday';
                if(event) { div.classList.add('has-event'); div.onclick = () => showCurriculumDetail(fullDate); }
                div.innerText = d;
                grid.appendChild(div);
            }
        }

        function drawMembers(data) {
            const list = document.getElementById('member-list');
            document.getElementById('m-count').innerText = data.length;
            list.innerHTML = data.map(m => `<div class="m-card"><div class="m-photo"><img src="${m.name}.jpg" onerror="this.src='https://via.placeholder.com/70x90?text=준비중'"></div><div><h3 style="font-size:1.1rem; color:var(--navy);">${m.name}</h3><p style="font-size:0.85rem; color:#666;">${m.company}</p><div class="m-btns"><a href="tel:${m.phone}" class="m-btn"><i class="fas fa-phone"></i></a><a href="mailto:${m.email}" class="m-btn"><i class="fas fa-envelope"></i></a></div></div></div>`).join('');
        }

        function runSearch() {
            const val = document.getElementById('m-search').value.toLowerCase();
            drawMembers(members.filter(m => m.name.includes(val) || m.company.includes(val)));
        }

        window.onload = () => { drawCalendar(); drawMembers(members); };
    </script>
