<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <link rel="apple-touch-icon" href="logo-koda.jpg">
    <link rel="icon" href="logo-koda.jpg">
    <meta name="theme-color" content="#002d56">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #002d56; --sub-navy: #1a3a5a; --gold: #D4AF37; --bg: #f5f5f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding-bottom: 75px; overflow-x: hidden; }
        .app-container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 2px solid var(--navy); background: #fff; position: sticky; top:0; z-index:100; }
        .logo { font-weight: 900; color: var(--navy); font-size: 1.6rem; cursor: pointer; letter-spacing: -1px; }

        .page { display: none; padding-bottom: 30px; }
        .page.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 🚀 메인 배경 이미지 (글씨 삭제) */
        .visual { height: 160px; background: var(--navy) url('main-bg.jpg') no-repeat center; background-size: cover; }

        /* 🚀 달력 세련되고 콤팩트하게 변경 */
        .cal-box { margin: 15px; background: var(--navy); border-radius: 12px; padding: 15px 10px; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; color: var(--gold); padding: 0 10px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; gap: 2px; }
        .cal-grid div { height: 35px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; cursor: pointer; position: relative; border-radius: 6px; }
        .cal-grid .day-label { height: 25px; font-size: 0.7rem; color: rgba(255,255,255,0.5); }
        .cal-grid .monday { color: var(--gold); font-weight: bold; }
        .cal-grid .has-event { background: rgba(255,255,255,0.1); font-weight: bold; }
        .cal-grid .has-event::after { content: ""; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); }

        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #ddd; }
        .grid-item { height: 100px; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .grid-item i { font-size: 1.6rem; color: var(--gold); margin-bottom: 6px; }
        .grid-item strong { font-size: 0.85rem; color: var(--navy); }

        .m-card { display: flex; padding: 15px; border-bottom: 1px solid #eee; align-items: center; gap: 15px; cursor: pointer; }
        .m-photo { width: 75px; height: 95px; background: #eee; border-radius: 6px; overflow: hidden; border: 1px solid #ddd; }
        .m-photo img { width: 100%; height: 100%; object-fit: cover; }
        .m-info { flex: 1; }
        .m-info h3 { font-size: 1.1rem; color: var(--navy); }
        .m-info p { font-size: 0.85rem; color: #666; margin-top: 2px; }

        .post-card { background: #fff; border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .gallery-item { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; }
        .gallery-thumb { width: 100%; aspect-ratio: 1/1; background: #f0f0f0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #fff; display: flex; height: 65px; border-top: 1px solid #ddd; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 0.65rem; cursor: pointer; }
        .nav-tab.active { color: var(--navy); font-weight: bold; }
        .nav-tab i { font-size: 1.35rem; margin-bottom: 3px; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-body { position: absolute; bottom: 0; width: 100%; max-width: 500px; background: #fff; border-top-left-radius: 25px; border-top-right-radius: 25px; padding: 25px; left: 50%; transform: translateX(-50%); max-height: 85vh; overflow-y: auto; }
    </style>
</head>

        function getDB() { return JSON.parse(localStorage.getItem('arp_db') || '[]'); }
        function saveDB(db) { localStorage.setItem('arp_db', JSON.stringify(db)); }

        function showPage(pageId, title = '') {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(title) { currentBoard = title; document.getElementById('board-title').innerText = title; }
            
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            const tabs = document.querySelectorAll('.nav-tab');
            if(pageId === 'main-page') tabs[0].classList.add('active');
            if(pageId === 'member-page') { tabs[1].classList.add('active'); renderMembers(members); }
            if(currentBoard === '공지사항') tabs[2].classList.add('active');
            if(currentBoard === '학습자료') tabs[3].classList.add('active');
            if(currentBoard === '사진첩') tabs[4].classList.add('active');
            if(pageId === 'board-page') drawBoard();
            
            window.scrollTo(0,0);
        }

        function drawCalendar() {
            document.getElementById('cal-month-title').innerText = `${currentYear}년 ${currentMonth}월`;
            const grid = document.getElementById('cal-grid-content');
            grid.innerHTML = '<div class="day-label">S</div><div class="day-label">M</div><div class="day-label">T</div><div class="day-label">W</div><div class="day-label">T</div><div class="day-label">F</div><div class="day-label">S</div>';
            
            const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth, 0).getDate();
            
            for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
            for(let d=1; d<=lastDate; d++) {
                const fullDate = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const event = curriculum[fullDate];
                const div = document.createElement('div');
                if(new Date(currentYear, currentMonth - 1, d).getDay() === 1) div.className = 'monday';
                
                if(event) { 
                    div.classList.add('has-event'); 
                    div.onclick = () => showCurriculumDetail(fullDate); 
                }
                div.innerText = d;
                grid.appendChild(div);
            }
        }

        function showCurriculumDetail(date) {
            const d = curriculum[date];
            document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('modal-img-wrap').style.display = 'none';
            document.getElementById('modal-view-title').innerText = `${date} 강의 안내`;
            document.getElementById('modal-view-content').innerHTML = `<strong>1교시:</strong> ${d.c1} (${d.l1})<br><br><strong>2교시:</strong> ${d.c2} (${d.l2})`;
            document.getElementById('modal-dl-link').style.display = 'none';
            document.getElementById('modal-action-btns').style.display = 'none';
        }

        function renderMembers(data) {
            const list = document.getElementById('member-list');
            document.getElementById('m-count').innerText = data.length;
            list.innerHTML = data.map(m => `
                <div class="m-card" onclick="showMemberDetail(${m.no})">
                    <div class="m-photo"><img src="${m.name}.jpg" onerror="this.src='https://via.placeholder.com/75x95?text=Pic'"></div>
                    <div class="m-info">
                        <h3>${m.name}</h3>
                        <p>${m.company} | ${m.pos}</p>
                    </div>
                </div>
            `).join('');
        }

        function showMemberDetail(no) {
            const m = members.find(x => x.no === no);
            document.getElementById('detail-modal').style.display = 'block';
            
            const imgWrap = document.getElementById('modal-img-wrap');
            imgWrap.style.display = 'block';
            imgWrap.innerHTML = `<img src="${m.name}.jpg" onerror="this.src='https://via.placeholder.com/100x130?text=NoPic'" style="width:100px; height:130px; object-fit:cover; border-radius:10px; border:1px solid #ddd;">`;
            
            document.getElementById('modal-view-title').innerText = `${m.name} 원우님`;
            
            let html = `<table style="width:100%; border-collapse:collapse; font-size:0.95rem;">`;
            const addRow = (label, val) => {
                if(val) html += `<tr><td style="padding:8px 0; width:30%; color:#666; font-weight:bold; vertical-align:top;">${label}</td><td style="padding:8px 0; color:#222;">${val}</td></tr>`;
            };
            addRow('소속', m.company);
            addRow('직위', m.pos);
            addRow('분과/분야', `${m.branch} / ${m.field}`);
            addRow('휴대전화', `<a href="tel:${m.phone}" style="color:#0277bd; text-decoration:none; font-weight:bold;">${m.phone}</a>`);
            addRow('이메일', `<a href="mailto:${m.email}" style="color:#0277bd; text-decoration:none;">${m.email}</a>`);
            if(m.tel) addRow('회사전화', `<a href="tel:${m.tel}" style="color:#0277bd; text-decoration:none;">${m.tel}</a>`);
            if(m.c_addr) addRow('회사주소', m.c_addr);
            html += `</table>`;
            
            document.getElementById('modal-view-content').innerHTML = html;
            document.getElementById('modal-dl-link').style.display = 'none';
            document.getElementById('modal-action-btns').style.display = 'none';
        }

        function drawBoard() {
            const list = document.getElementById('board-list-content');
            let posts = getDB().filter(p => p.board === currentBoard);
            if(currentBoard === '사진첩') {
                let html = '<div class="gallery-grid">';
                html += posts.map(p => `
                    <div class="gallery-item" onclick="showBoardDetail(${p.id})">
                        <div class="gallery-thumb">
                            ${p.fileName ? `<img src="https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${encodeURIComponent(p.fileName)}">` : '<i class="fas fa-image" style="color:#ccc; font-size:2rem;"></i>'}
                        </div>
                        <div style="padding:8px; font-size:0.8rem; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${p.subject}</div>
                    </div>
                `).join('');
                list.innerHTML = html + '</div>';
            } else {
                let html = "";
                if(currentBoard === '공지사항') {
                    html += Object.keys(curriculum).map(date => `<div class="post-card" onclick="showCurriculumDetail('${date}')"><div><h4>${curriculum[date].title}</h4><p style="font-size:0.8rem; color:#888;">${date} 강의안내</p></div><i class="fas fa-chevron-right" style="color:#ddd;"></i></div>`).join('');
                }
                html += posts.map(p => `<div class="post-card" onclick="showBoardDetail(${p.id})"><div><h4>${p.subject}</h4><p style="font-size:0.8rem; color:#888;">${p.date} ${p.fileName ? '📎' : ''}</p></div><i class="fas fa-chevron-right" style="color:#ddd;"></i></div>`).join('');
                list.innerHTML = html || '<div style="padding:50px; text-align:center; color:#ccc;">글이 없습니다.</div>';
            }
        }

        function showBoardDetail(id) {
            const p = getDB().find(i => i.id == id);
            selectedId = id;
            document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('modal-view-title').innerText = p.subject;
            document.getElementById('modal-view-content').innerText = p.content;
            
            const imgWrap = document.getElementById('modal-img-wrap');
            const dl = document.getElementById('modal-dl-link');
            const btns = document.getElementById('modal-action-btns');
            
            btns.style.display = 'flex';
            
            if(p.fileName) {
                const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${encodeURIComponent(p.fileName)}`;
                dl.style.display = 'block'; dl.href = url;
                if(p.fileName.match(/\.(jpg|jpeg|png|gif)$/i)) {
                    imgWrap.style.display = 'block'; imgWrap.innerHTML = `<img src="${url}" style="width:100%; border-radius:12px;">`;
                } else { imgWrap.style.display = 'none'; }
            } else { dl.style.display = 'none'; imgWrap.style.display = 'none'; }
        }

        function savePost() {
            const sub = document.getElementById('post-subject').value;
            const con = document.getElementById('post-content').value;
            const fname = document.getElementById('file-name-input').value;
            const editId = document.getElementById('edit-id').value;
            if(!sub) return alert('제목을 입력하세요!');
            let db = getDB();
            if(editId) {
                const idx = db.findIndex(i => i.id == editId);
                db[idx] = {...db[idx], subject: sub, content: con, fileName: fname};
            } else {
                db.unshift({ id: Date.now(), board: currentBoard, subject: sub, content: con, fileName: fname, date: new Date().toLocaleDateString() });
            }
            saveDB(db); alert('저장 완료!'); showPage('board-page', currentBoard);
        }

        function openWrite() {
            document.getElementById('edit-id').value = "";
            document.getElementById('post-subject').value = "";
            document.getElementById('post-content').value = "";
            document.getElementById('file-name-input').value = "";
            showPage('write-page');
        }

        function editPost() {
            const p = getDB().find(i => i.id == selectedId);
            document.getElementById('detail-modal').style.display = 'none';
            document.getElementById('edit-id').value = p.id;
            document.getElementById('post-subject').value = p.subject;
            document.getElementById('post-content').value = p.content;
            document.getElementById('file-name-input').value = p.fileName;
            showPage('write-page');
        }

        function deletePost() {
            if(!confirm('삭제하시겠습니까?')) return;
            saveDB(getDB().filter(i => i.id != selectedId));
            document.getElementById('detail-modal').style.display = 'none';
            drawBoard();
        }

        function runSearch() {
            const val = document.getElementById('m-search').value.toLowerCase();
            renderMembers(members.filter(m => m.name.includes(val) || m.company.includes(val)));
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if(currentMonth < 1) { currentYear--; currentMonth = 12; }
            if(currentMonth > 12) { currentYear++; currentMonth = 1; }
            drawCalendar();
        }

        window.onload = () => { drawCalendar(); renderMembers(members); };
    </script>
</body>
</html>
