<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KODA ARP 12기</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #002d56; --sub-navy: #1a3a5a; --gold: #D4AF37; --bg: #f5f5f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding-bottom: 75px; }
        .app-container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; }
        
        /* 헤더 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 2px solid var(--navy); background: #fff; position: sticky; top:0; z-index:100; }
        .logo { font-weight: 900; color: var(--navy); font-size: 1.6rem; cursor: pointer; }

        .page { display: none; padding-bottom: 30px; }
        .page.active { display: block; }

        /* 달력 */
        .cal-box { margin: 15px; background: var(--sub-navy); border-radius: 15px; padding: 15px 10px; color: #fff; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; width: 100%; gap: 1px; }
        .cal-grid div { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; cursor: pointer; position: relative; min-height: 45px; }
        .cal-grid .day-label { aspect-ratio: auto; height: 30px; font-size: 0.7rem; color: rgba(255,255,255,0.4); }
        .cal-grid .monday { color: var(--gold); font-weight: bold; }
        .cal-grid .has-event::after { content: ""; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); }

        /* 원우 카드 */
        .m-card { display: flex; padding: 15px; border-bottom: 1px solid #eee; align-items: center; gap: 15px; cursor: pointer; }
        .m-photo { width: 70px; height: 90px; background: #eee; border-radius: 6px; overflow: hidden; border: 1px solid #ddd; }
        .m-photo img { width: 100%; height: 100%; object-fit: cover; }
        .m-info h3 { font-size: 1.1rem; color: var(--navy); }
        .m-info p { font-size: 0.85rem; color: #666; }

        /* 하단 탭바 */
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #fff; display: flex; height: 65px; border-top: 1px solid #ddd; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 0.65rem; cursor: pointer; }
        .nav-tab.active { color: var(--navy); font-weight: bold; }
        .nav-tab i { font-size: 1.3rem; margin-bottom: 3px; }

        /* 모달 팝업 */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-body { position: absolute; bottom: 0; width: 100%; max-width: 500px; background: #fff; border-top-left-radius: 25px; border-top-right-radius: 25px; padding: 25px; left: 50%; transform: translateX(-50%); animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translate(-50%, 100%); } to { transform: translate(-50%, 0); } }
        .close-btn { width: 100%; padding: 12px; background: var(--navy); color: #fff; border: none; border-radius: 10px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo" onclick="location.reload()">KODA-ARP</div>
            <i class="fas fa-bars" style="color:var(--navy); font-size:1.2rem;"></i>
        </header>

        <div id="main-page" class="page active">
            <div style="height:120px; background:var(--navy); display:flex; align-items:center; justify-content:center; color:#fff; text-align:center;">
                <h3 id="main-title">창조도시부동산융합 최고위 과정 12기</h3>
            </div>
            <div class="cal-box">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; color:var(--gold);">
                    <i class="fas fa-chevron-left" onclick="changeMonth(-1)"></i>
                    <span id="cal-month-title" style="font-weight:bold; font-size:1.1rem;">2026년 3월</span>
                    <i class="fas fa-chevron-right" onclick="changeMonth(1)"></i>
                </div>
                <div class="cal-grid" id="cal-grid-content"></div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; background:#ddd; gap:1px;">
                <div style="height:100px; background:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center;" onclick="showPage('member-page')"><i class="fas fa-id-card" style="color:var(--gold); font-size:1.6rem; margin-bottom:6px;"></i><strong>원우명단</strong></div>
                <div style="height:100px; background:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center;" onclick="alert('준비중')"><i class="fas fa-bullhorn" style="color:var(--gold); font-size:1.6rem; margin-bottom:6px;"></i><strong>공지사항</strong></div>
            </div>
        </div>

        <div id="member-page" class="page">
            <div style="padding:15px; background:#fff; border-bottom:4px solid var(--gold); position:sticky; top:62px; z-index:90;">
                <input type="text" id="m-search" placeholder="성함 또는 소속 검색" oninput="runSearch()" style="width:100%; padding:10px 20px; border-radius:30px; border:1px solid #ddd; outline:none; background:#f1f3f5;">
            </div>
            <div id="member-list"></div>
        </div>

        <nav class="nav-bar">
            <div class="nav-tab active" onclick="showPage('main-page')"><i class="fas fa-home"></i><span>홈</span></div>
            <div class="nav-tab" onclick="showPage('member-page')"><i class="fas fa-id-card"></i><span>원우명단</span></div>
            <div class="nav-tab" onclick="alert('준비중')"><i class="fas fa-bullhorn"></i><span>공지</span></div>
            <div class="nav-tab" onclick="alert('준비중')"><i class="fas fa-camera"></i><span>사진첩</span></div>
        </nav>
    </div>

    <div id="info-modal" class="modal" onclick="closeModal()">
        <div class="modal-body" onclick="event.stopPropagation()">
            <h2 id="modal-title" style="color:var(--navy); margin-bottom:15px; font-size:1.2rem; border-bottom:2px solid var(--gold); padding-bottom:10px;">상세정보</h2>
            <div id="modal-content" style="line-height:1.7; color:#333; white-space:pre-wrap;"></div>
            <button class="close-btn" onclick="closeModal()">닫기</button>
        </div>
    </div>

    <script>
        // 🚀 데이터 정의
        const curriculum = {
            "2026-03-16": "입학식 (KODA 사무국)",
            "2026-03-23": "2주차: 부동산트랜드와 주택 정책 (진희선 교수)",
            "2026-03-30": "3주차: 부동산 프로젝트 리츠 사업 (김승범 과장)",
            "2026-04-06": "4주차: 디벨로퍼의 상상력 (문주현 회장)",
            "2026-04-13": "5주차: 인구와 부, 인구학 (고우림 교수)"
        };

        const members = [
            { name: "김구현", company: "케이알산업", pos: "상무", phone: "010-9401-8700", email: "kimkh@krindus.co.kr" },
            { name: "김기현", company: "코람코자산신탁", pos: "이사", phone: "010-8591-3971", email: "escoba@hanmail.net" },
            { name: "김선철", company: "㈜나산종합건축사사무소", pos: "사장", phone: "010-2319-8502", email: "sunchal2001@hanmail.net" },
            { name: "홍창표", company: "유진투자증권", pos: "담당", phone: "010-9543-4445", email: "hcpwin@naver.com" }
            // (나머지 60명 데이터는 용량상 생략하지만, 형님이 이전에 넣으신 데이터를 이 리스트에 추가하시면 됩니다)
        ];

        let currentYear = 2026; 
        let currentMonth = 3;

        // 🚀 페이지 전환 함수
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            if(pageId === 'main-page') document.querySelectorAll('.nav-tab')[0].classList.add('active');
            if(pageId === 'member-page') {
                document.querySelectorAll('.nav-tab')[1].classList.add('active');
                renderMembers(members);
            }
        }

        // 🚀 모달 제어 함수
        function openModal(title, content) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').innerText = content;
            document.getElementById('info-modal').style.display = 'block';
        }
        function closeModal() {
            document.getElementById('info-modal').style.display = 'none';
        }

        // 🚀 달력 그리기
        function drawCalendar() {
            const grid = document.getElementById('cal-grid-content');
            document.getElementById('cal-month-title').innerText = `${currentYear}년 ${currentMonth}월`;
            
            grid.innerHTML = '<div class="day-label">S</div><div class="day-label">M</div><div class="day-label">T</div><div class="day-label">W</div><div class="day-label">T</div><div class="day-label">F</div><div class="day-label">S</div>';
            
            const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth, 0).getDate();
            
            for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
            
            for(let d=1; d<=lastDate; d++) {
                const fullDate = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const div = document.createElement('div');
                div.innerText = d;
                
                if(new Date(currentYear, currentMonth - 1, d).getDay() === 1) div.className = 'monday';
                
                if(curriculum[fullDate]) {
                    div.classList.add('has-event');
                    div.onclick = () => openModal(`${fullDate} 수업 정보`, curriculum[fullDate]);
                }
                grid.appendChild(div);
            }
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if(currentMonth < 1) { currentYear--; currentMonth = 12; }
            if(currentMonth > 12) { currentYear++; currentMonth = 1; }
            drawCalendar();
        }

        // 🚀 원우 명단 그리기
        function renderMembers(data) {
            const list = document.getElementById('member-list');
            list.innerHTML = data.map(m => `
                <div class="m-card" onclick="openModal('${m.name} 원우 정보', '소속: ${m.company}\\n직위: ${m.pos}\\n연락처: ${m.phone}\\n이메일: ${m.email}')">
                    <div class="m-photo"><img src="${m.name}.jpg" onerror="this.src='https://via.placeholder.com/70x90?text=Pic'"></div>
                    <div class="m-info">
                        <h3>${m.name}</h3>
                        <p>${m.company} | ${m.pos}</p>
                    </div>
                </div>
            `).join('');
        }

        function runSearch() {
            const val = document.getElementById('m-search').value.toLowerCase();
            const filtered = members.filter(m => m.name.includes(val) || m.company.includes(val));
            renderMembers(filtered);
        }

        window.onload = () => {
            drawCalendar();
            renderMembers(members);
        };
    </script>
</body>
</html>
