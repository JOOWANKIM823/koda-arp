<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KODA ARP 모바일앱</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">KODA ARP</div>
            <div class="header-right">
                <span>로그인</span>
                <div class="menu-btn" id="menu-open">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </header>

        <section class="main-visual">
            <div class="visual-text">
                <p>KODA ARP 최고위과정</p>
                <h1>대한민국을 대표하는<br>부동산 전문가의 자부심</h1>
            </div>
            <div class="side-tabs">
                <div class="tab">맞춤형 ▶</div>
                <div class="tab active">메인1</div>
                <div class="tab">메인2</div>
                <div class="tab">메인3</div>
            </div>
        </section>

        <section class="quick-banner">
            <div class="triangle"></div>
            <h3>빠른메뉴</h3>
            <p>QUICK MENU</p>
        </section>

        <nav class="grid-menu">
            <div class="grid-item">
                <i class="far fa-star"></i>
                <strong>소개</strong>
                <span>ABOUT</span>
            </div>
            <div class="grid-item">
                <i class="far fa-id-card"></i>
                <strong>원우수첩</strong>
                <span>MOBILE NOTE</span>
            </div>
            <div class="grid-item">
                <i class="far fa-newspaper"></i>
                <strong>소식</strong>
                <span>NEWS</span>
            </div>
            <div class="grid-item">
                <i class="fas fa-edit"></i>
                <strong>자유게시판</strong>
                <span>FREE BOARD</span>
            </div>
        </nav>

        <div class="floating-area">
            <div class="f-btn yellow"><i class="fas fa-phone"></i> 전화문의</div>
            <div class="f-btn dark"><i class="fas fa-home"></i> 홈페이지</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
