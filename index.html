<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KODA ARP 모바일앱</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div id="main-page" class="page active">
            <header>
                <div class="logo">KODA ARP</div>
                <div class="header-right">
                    <span>로그인</span>
                    <div class="menu-btn"><span></span><span></span><span></span></div>
                </div>
            </header>

            <section class="main-visual">
                <div class="visual-text">
                    <p>KODA ARP 최고위과정</p>
                    <h1>대한민국을 대표하는<br>부동산 전문가의 자부심</h1>
                </div>
            </section>

            <section class="quick-banner"><h3>빠른메뉴 QUICK MENU</h3></section>

            <nav class="grid-menu">
                <div class="grid-item" onclick="showPage('member-page')">
                    <i class="far fa-id-card"></i>
                    <strong>원우수첩</strong>
                    <span>MOBILE NOTE</span>
                </div>
                </nav>
        </div>

        <div id="member-page" class="page">
            <header class="sub-header">
                <button onclick="showPage('main-page')" class="back-btn"><i class="fas fa-arrow-left"></i></button>
                <h2>원우수첩</h2>
            </header>
            <div class="search-box">
                <input type="text" placeholder="원우 이름을 검색하세요">
            </div>
            <ul class="member-list">
                <li class="member-item">
                    <div class="m-info">
                        <strong>김주완 원우</strong>
                        <span>12기 | KODA 협회</span>
                    </div>
                    <a href="tel:01000000000" class="call-btn"><i class="fas fa-phone"></i></a>
                </li>
                </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
