<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KODA ARP 12기</title>
    
    <link rel="apple-touch-icon" href="logo-koda.jpg">
    <link rel="icon" href="logo-koda.jpg">
    <meta name="theme-color" content="#002d56">
    <meta name="apple-mobile-web-app-status-bar-style" content="#002d56">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #002d56; --sub-navy: #1a3a5a; --gold: #D4AF37; --gray: #bdc3c7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #eee; padding-bottom: 75px; overflow-x: hidden; }
        .app-container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; }
        
        .header { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 2px solid var(--navy); background: #fff; position: sticky; top:0; z-index:100; }
        .logo { font-weight: 800; color: var(--navy); font-size: 1.2rem; cursor: pointer; }

        .page { display: none; padding-bottom: 30px; }
        .page.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .visual { height: 150px; background: var(--navy) url('main-bg.jpg') no-repeat center; background-size: cover; }

        /* 검색 배너 */
        .search-banner { margin: 15px; background: var(--gray); border-radius: 20px; height: 130px; position: relative; cursor: pointer; padding: 20px; overflow: hidden; }
        .search-banner::after { content: "\f500 \f508"; font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); font-size: 4rem; color: rgba(255,255,255,0.3); letter-spacing: 15px; }
        .click-badge { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; animation: pulse 2s infinite; border: 2px solid rgba(255,255,255,0.2); z-index: 10; pointer-events: none; }
        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.1); } }

        /* 게시판 UI */
        .board-header { padding: 15px; background: var(--navy); color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .write-btn { padding: 6px 15px; background: var(--gold); color: #fff; border-radius: 5px; font-size: 0.85rem; font-weight: bold; cursor: pointer; }
        .post-card { background: #fff; border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        /* 수정/삭제 버튼 */
        .admin-btns { display: flex; gap: 8px; margin-top: 10px; }
        .admin-btn { font-size: 0.8rem; padding: 4px 8px; border-radius: 4px; cursor: pointer; border: 1px solid #ddd; }
        .btn-del { color: #e74c3c; border-color: #fab1a0; }

        /* 글쓰기/파일 UI */
        .write-container { padding: 20px; }
        .write-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .file-box { background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px dashed #ccc; margin-bottom: 15px; text-align: center; cursor: pointer; }

        /* 하단바 */
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #fff; display: flex; height: 65px; border-top: 1px solid #ddd; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 0.65rem; cursor: pointer; }
        .nav-tab.active { color: var(--navy); font-weight: bold; }
        .nav-tab i { font-size: 1.3rem; margin-bottom: 3px; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-body { position: absolute; bottom: 0; width: 100%; max-width: 500px; background: #fff; border-top-left-radius: 25px; border-top-right-radius: 25px; padding: 25px; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo" onclick="showPage('main-page')">KODA-ARP</div>
            <div class="menu-btn" onclick="showPage('write-page')"><i class="fas fa-pen-to-square"></i></div>
        </header>

        <div id="main-page" class="page active">
            <div class="visual"></div>
            <div class="search-banner" onclick="showPage('member-page')">
                <h2 style="color:var(--navy);">ARP 원우 리스트 검색</h2>
                <div class="click-badge">Click</div>
            </div>
            <div id="main-cal-container"></div> <footer style="padding:25px; background:var(--navy); color:#fff; font-size:0.7rem; line-height:1.6; text-align:center;">
                KODA-ARP 창조도시부동산융합 최고위과정<br>TEL: 02-512-4750 | E-MAIL: koda@koda.or.kr
            </footer>
        </div>

        <div id="board-page" class="page">
            <div class="board-header">
                <span id="board-title">게시판</span>
                <div class="write-btn" onclick="openWrite()">글쓰기</div>
            </div>
            <div id="board-list-content"></div>
        </div>

        <div id="write-page" class="page">
            <div class="board-header">
                <span id="write-mode-title">글쓰기</span>
                <div class="write-btn" onclick="savePost()">저장하기</div>
            </div>
            <div class="write-container">
                <input type="hidden" id="edit-id">
                <input type="text" id="post-subject" class="write-input" placeholder="제목을 입력하세요.">
                <textarea id="post-content" class="write-input" style="height:200px; resize:none;" placeholder="내용을 입력하세요."></textarea>
                <div class="file-box" onclick="document.getElementById('file-input').click()">
                    <i class="fas fa-paperclip"></i> <span id="file-status">학습자료/사진 파일 첨부</span>
                    <input type="file" id="file-input" style="display:none;" onchange="handleFile(this)">
                </div>
            </div>
        </div>

        <div id="member-page" class="page">... (60명 명단 로직 포함) ...</div>

        <nav class="nav-bar">
            <div class="nav-tab active" onclick="showPage('main-page')"><i class="fas fa-home"></i><span>홈</span></div>
            <div class="nav-tab" onclick="showPage('member-page')"><i class="fas fa-id-card"></i><span>원우명단</span></div>
            <div class="nav-tab" onclick="showPage('board-page', '공지사항')"><i class="fas fa-bullhorn"></i><span>공지</span></div>
            <div class="nav-tab" onclick="showPage('board-page', '학습자료')"><i class="fas fa-file-alt"></i><span>학습자료</span></div>
            <div class="nav-tab" onclick="showPage('board-page', '사진첩')"><i class="fas fa-images"></i><span>사진첩</span></div>
        </nav>
    </div>

    <div id="info-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-body" onclick="event.stopPropagation()">
            <h2 id="modal-title" style="color:var(--navy); font-size:1.1rem;"></h2>
            <div id="modal-content" style="margin-top:15px; line-height:1.6; white-space:pre-wrap;"></div>
            <div id="modal-file-link" style="margin-top:15px; padding:10px; background:#f1f3f5; border-radius:5px; font-size:0.85rem; display:none;"></div>
            <div class="admin-btns">
                <div class="admin-btn" onclick="editPost()">수정</div>
                <div class="admin-btn btn-del" onclick="deletePost()">삭제</div>
            </div>
            <button onclick="document.getElementById('info-modal').style.display='none'" style="width:100%; margin-top:15px; padding:12px; background:var(--navy); color:#fff; border:none; border-radius:10px;">닫기</button>
        </div>
    </div>

    <script>
        let currentBoard = '공지사항';
        let attachedFileName = "";
        let selectedPostId = null;

        // 로컬 저장소 연동
        function getDB() { return JSON.parse(localStorage.getItem('arp_db') || '[]'); }
        function saveDB(db) { localStorage.setItem('arp_db', JSON.stringify(db)); }

        function handleFile(input) {
            if(input.files && input.files[0]) {
                attachedFileName = input.files[0].name;
                document.getElementById('file-status').innerText = "첨부됨: " + attachedFileName;
            }
        }

        function openWrite() {
            document.getElementById('edit-id').value = "";
            document.getElementById('post-subject').value = "";
            document.getElementById('post-content').value = "";
            document.getElementById('file-status').innerText = "학습자료/사진 파일 첨부";
            attachedFileName = "";
            document.getElementById('write-mode-title').innerText = currentBoard + " 글쓰기";
            showPage('write-page');
        }

        function savePost() {
            const subject = document.getElementById('post-subject').value;
            const content = document.getElementById('post-content').value;
            const editId = document.getElementById('edit-id').value;
            if(!subject || !content) return alert('제목과 내용을 입력해주세요.');

            let db = getDB();
            if(editId) {
                const idx = db.findIndex(i => i.id == editId);
                db[idx].subject = subject;
                db[idx].content = content;
                if(attachedFileName) db[idx].fileName = attachedFileName;
            } else {
                db.unshift({
                    id: Date.now(),
                    board: currentBoard,
                    subject: subject,
                    content: content,
                    fileName: attachedFileName,
                    date: new Date().toLocaleDateString()
                });
            }
            saveDB(db);
            alert('저장 완료!');
            showPage('board-page', currentBoard);
        }

        function drawBoard(title) {
            const list = document.getElementById('board-list-content');
            const posts = getDB().filter(p => p.board === title);
            if(posts.length === 0) {
                list.innerHTML = '<div style="padding:50px; text-align:center; color:#ccc;">등록된 글이 없습니다.</div>';
            } else {
                list.innerHTML = posts.map(p => `
                    <div class="post-card" onclick="showDetail(${p.id})">
                        <div>
                            <h4 style="color:#333;">${p.subject}</h4>
                            <p style="font-size:0.75rem; color:#888;">${p.date} ${p.fileName ? '📎' : ''}</p>
                        </div>
                        <i class="fas fa-chevron-right" style="color:#ddd;"></i>
                    </div>
                `).join('');
            }
        }

        function showDetail(id) {
            const p = getDB().find(i => i.id == id);
            selectedPostId = id;
            document.getElementById('info-modal').style.display = 'block';
            document.getElementById('modal-title').innerText = p.subject;
            document.getElementById('modal-content').innerText = p.content;
            const fLink = document.getElementById('modal-file-link');
            if(p.fileName) {
                fLink.style.display = 'block';
                fLink.innerHTML = `<i class="fas fa-file"></i> 첨부파일: ${p.fileName}`;
            } else {
                fLink.style.display = 'none';
            }
        }

        function deletePost() {
            if(!confirm('정말 삭제하시겠습니까?')) return;
            let db = getDB();
            db = db.filter(i => i.id != selectedPostId);
            saveDB(db);
            document.getElementById('info-modal').style.display = 'none';
            drawBoard(currentBoard);
        }

        function editPost() {
            const p = getDB().find(i => i.id == selectedPostId);
            document.getElementById('info-modal').style.display = 'none';
            document.getElementById('edit-id').value = p.id;
            document.getElementById('post-subject').value = p.subject;
            document.getElementById('post-content').value = p.content;
            document.getElementById('file-status').innerText = p.fileName ? "기존파일: " + p.fileName : "파일 첨부";
            showPage('write-page');
        }

        function showPage(pageId, title = '') {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(title) { currentBoard = title; document.getElementById('board-title').innerText = title; }
            if(pageId === 'board-page') drawBoard(currentBoard);
            window.scrollTo(0,0);
        }

        // ... (나머지 60명 명단 및 달력 로직 포함)
    </script>
</body>
</html>
