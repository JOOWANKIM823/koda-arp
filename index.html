        /* 헤더 */
        .main-header { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 2px solid var(--navy); background: #fff; position: sticky; top:0; z-index:100; }
        .logo { font-weight: 800; color: var(--navy); font-size: 1.3rem; cursor: pointer; letter-spacing: -1px; }
        .menu-btn { color: var(--navy); font-size: 1.3rem; cursor: pointer; }
        
        /* 사이드바 */
        .sidebar { position: fixed; top: 0; right: -250px; width: 250px; height: 100%; background: #fff; z-index: 200; transition: right 0.3s ease-out; box-shadow: -5px 0 15px rgba(0,0,0,0.2); padding-top: 60px; }
        .sidebar.open { right: 0; }
        .sidebar-item { padding: 15px 25px; border-bottom: 1px solid #eee; color: var(--navy); font-weight: 500; cursor: pointer; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 199; display: none; opacity: 0; transition: opacity 0.3s; }
        .sidebar-overlay.show { display: block; opacity: 1; }

        .page { display: none; flex: 1; }
        .page.active { display: block; }

        /* 메인 비주얼 (텍스트 제거) */
        .main-visual { height: 200px; background-size: cover; background-position: center; position: relative; background-image: url('main-bg.jpg'); }

        /* 대시보드 */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #ddd; }
        .grid-item { height: 160px; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .grid-item i { font-size: 2.5rem; color: var(--gold); margin-bottom: 15px; }
        .grid-item strong { font-size: 1rem; color: var(--navy); font-weight: 700; }

        /* 리스트 */
        .list-header { padding: 15px; background: #f4f4f4; font-weight: bold; border-bottom: 4px solid var(--gold); color: var(--navy); display: flex; justify-content: space-between; align-items: center; }
        .member-card { display: flex; padding: 15px 20px; border-bottom: 1px solid #eee; align-items: center; gap: 15px; }
        .photo-area { width: 85px; height: 110px; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; background: #f0f0f0; flex-shrink: 0; cursor: pointer; }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; }
        .info-area { flex: 1; }
        .info-area .tag { color: #4a6fa5; font-size: 0.75rem; font-weight: bold; margin-bottom: 2px; }
        .info-area h3 { font-size: 1.2rem; margin-bottom: 4px; letter-spacing: 2px; cursor: pointer; }
        .info-area p { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
        
        /* 버튼 기능 */
        .icon-group { display: flex; gap: 12px; }
        .icon-btn { width: 34px; height: 34px; background: var(--btn-gray); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #dee2e6; cursor: pointer; text-decoration: none; }
        .icon-btn i { font-size: 0.9rem; color: var(--btn-icon); }

        /* 상세 모달 */
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: #fff; overflow-y: auto; }
        .modal-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; position: sticky; top: 0; background: #fff; z-index: 10; }
        .detail-table { width: 100%; border-collapse: collapse; }

        .detail-table td { padding: 12px; border: 1px solid #eee; font-size: 0.9rem; }

        .main-footer { background: var(--footer-bg); color: #fff; padding: 15px 20px; text-align: left; font-size: 0.75rem; line-height: 1.5; }

</head>

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('show');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
            if(pageId === 'member-page') renderMembers();
        }

        function renderMembers() {
            const listWrap = document.getElementById('member-list-items');
            document.getElementById('total-count').innerText = members.length;
            listWrap.innerHTML = members.map(m => `
                <div class="member-card">
                    <div class="photo-area" onclick="openDetail(${m.no})"><img src="${m.name}.jpg" onerror="this.src='https://via.placeholder.com/85x110?text=사진준비중'"></div>
                    <div class="info-area">
                        <div class="tag">ARP 12기</div>
                        <h3 onclick="openDetail(${m.no})">${m.name}</h3>
                        <p>${m.company} | ${m.pos}</p>
                        <div class="icon-group">
                            <div class="icon-btn"><i class="fas fa-calendar-alt"></i></div>
                            <div class="icon-btn" onclick="openDetail(${m.no})"><i class="fas fa-pen"></i></div>
                            <a href="tel:${m.phone}" class="icon-btn"><i class="fas fa-phone"></i></a>
                            <a href="mailto:${m.email}" class="icon-btn"><i class="fas fa-envelope"></i></a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openDetail(no) {
            const m = members.find(i => i.no === no);
            const modal = document.getElementById('detail-modal');
            document.getElementById('modal-body').innerHTML = `
                <div style="display:flex; padding:25px 20px; gap:20px; border-bottom:1px solid #eee; align-items:center;">
                    <div class="photo-area" style="width:100px; height:125px;"><img src="${m.name}.jpg" onerror="this.src='https://via.placeholder.com/100x125?text=No+Pic'"></div>
                    <div><h2 style="color:var(--navy);">${m.name}</h2><p style="color:#666;">${m.company}</p><p style="color:#666;">${m.pos}</p></div>
                </div>
                <table class="detail-table">
                    <tr><th>학번</th><td>${m.id}</td></tr><tr><th>분과</th><td>${m.group}</td></tr><tr><th>휴대전화</th><td>${m.phone}</td></tr><tr><th>이메일</th><td>${m.email}</td></tr><tr><th>회사주소</th><td>${m.addr}</td></tr>
                </table>
            `;
            modal.style.display = "block";
        }
        function closeModal() { document.getElementById('detail-modal').style.display = "none"; }
        window.onload = () => { renderMembers(); };
    </script>
