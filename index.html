<!DOCTYPE html>

    <style>
        :root { --navy: #002d56; --sub-navy: #1a3a5a; --gold: #D4AF37; --bg: #f5f5f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding-bottom: 75px; overflow-x: hidden; }
        .app-container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; }
        
        .header { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 2px solid var(--navy); background: #fff; position: sticky; top:0; z-index:100; }
        .logo { font-weight: 800; color: var(--navy); font-size: 1.2rem; cursor: pointer; }

        .page { display: none; padding-bottom: 30px; }
        .page.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .visual { height: 140px; background: var(--navy) url('main-bg.jpg') no-repeat center; background-size: cover; }

        /* 검색 배너 */
        .search-banner { margin: 15px; background: #bdc3c7; border-radius: 20px; height: 130px; position: relative; cursor: pointer; padding: 20px; overflow: hidden; }
        .search-banner::after { content: "\f500 \f508"; font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); font-size: 4rem; color: rgba(255,255,255,0.3); letter-spacing: 15px; }
        .click-badge { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; animation: pulse 2s infinite; border: 2px solid rgba(255,255,255,0.2); z-index: 10; pointer-events: none; }
        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.1); } }

        /* 정사각형 격자 달력 */
        .cal-box { margin: 0 15px 15px; background: var(--sub-navy); border-radius: 15px; padding: 15px 5px; color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: var(--gold); padding: 0 10px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; border-top: 1px solid rgba(255,255,255,0.1); border-left: 1px solid rgba(255,255,255,0.1); }
        .cal-grid div { height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer; position: relative; border-right: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .cal-grid .day-label { font-size: 0.75rem; color: rgba(255,255,255,0.4); height: 35px; border: none; background: rgba(0,0,0,0.1); }
        .cal-grid .has-event::after { content: ""; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; position: absolute; bottom: 8px; }

        /* 게시판 UI */
        .board-header { padding: 15px; background: var(--navy); color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .write-btn { padding: 6px 12px; background: var(--gold); color: #fff; border-radius: 5px; font-size: 0.85rem; font-weight: bold; cursor: pointer; }
        .post-card { background: #fff; border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        /* 글쓰기 페이지 */
        .write-container { padding: 20px; }
        .input-text { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .file-input-box { background: #f8f9fa; padding: 15px; border: 1px dashed #ccc; border-radius: 8px; text-align: center; cursor: pointer; margin-bottom: 15px; }

        /* 하단바 */
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #fff; display: flex; height: 65px; border-top: 1px solid #ddd; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 0.65rem; cursor: pointer; }
        .nav-tab.active { color: var(--navy); font-weight: bold; }
        .nav-tab i { font-size: 1.3rem; margin-bottom: 3px; }

        /* 모달 팝업 */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-body { position: absolute; bottom: 0; width: 100%; max-width: 500px; background: #fff; border-top-left-radius: 25px; border-top-right-radius: 25px; padding: 25px; left: 50%; transform: translateX(-50%); }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-action { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>

        // 🚀 로컬 데이터베이스 연동
        function getDB() { return JSON.parse(localStorage.getItem('arp_db') || '[]'); }
        function saveDB(db) { localStorage.setItem('arp_db', JSON.stringify(db)); }

        function handleFileChange(input) {
            if(input.files[0]) {
                attachedFile = input.files[0].name;
                document.getElementById('file-name-status').innerText = "📎 첨부됨: " + attachedFile;
            }
        }

        function openWrite() {
            document.getElementById('edit-id').value = "";
            document.getElementById('post-subject').value = "";
            document.getElementById('post-content').value = "";
            document.getElementById('file-name-status').innerText = "파일 첨부 (학습자료/사진)";
            attachedFile = "";
            showPage('write-page');
        }

        function savePost() {
            const sub = document.getElementById('post-subject').value;
            const con = document.getElementById('post-content').value;
            const editId = document.getElementById('edit-id').value;
            if(!sub || !con) return alert('내용을 채워주세요!');

            let db = getDB();
            if(editId) {
                const idx = db.findIndex(i => i.id == editId);
                db[idx].subject = sub;
                db[idx].content = con;
                if(attachedFile) db[idx].fileName = attachedFile;
            } else {
                db.unshift({ id: Date.now(), board: currentBoard, subject: sub, content: con, fileName: attachedFile, date: new Date().toLocaleDateString() });
            }
            saveDB(db); alert('저장 완료!'); showPage('board-page', currentBoard);
        }

        function drawBoard() {
            const list = document.getElementById('board-list-content');
            // 공지사항은 커리큘럼 데이터와 로컬 게시글을 합쳐서 보여줌
            let posts = getDB().filter(p => p.board === currentBoard);
            let html = "";
            
            if(currentBoard === '공지사항') {
                html += Object.keys(curriculumData).map(date => `
                    <div class="post-card" onclick="showCurriculumDetail('${date}')">
                        <div><h4>${curriculumData[date].title}</h4><p style="font-size:0.8rem; color:#888;">${date} 강의안내</p></div>
                        <i class="fas fa-chevron-right" style="color:#ddd;"></i>
                    </div>
                `).join('');
            }
            
            html += posts.map(p => `
                <div class="post-card" onclick="showPostDetail(${p.id})">
                    <div><h4>${p.subject}</h4><p style="font-size:0.8rem; color:#888;">${p.date} ${p.fileName ? '📎' : ''}</p></div>
                    <i class="fas fa-chevron-right" style="color:#ddd;"></i>
                </div>
            `).join('');

            list.innerHTML = html || '<div style="padding:50px; text-align:center; color:#ccc;">등록된 글이 없습니다.</div>';
        }

        function showCurriculumDetail(date) {
            const d = curriculumData[date];
            document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('modal-view-title').innerText = d.title;
            document.getElementById('modal-view-content').innerHTML = `<strong>1교시:</strong> ${d.c1} (${d.l1})\n<strong>2교시:</strong> ${d.c2} (${d.l2})`;
            document.getElementById('modal-file-info').style.display = 'none';
        }

        function showPostDetail(id) {
            const p = getDB().find(i => i.id == id);
            selectedPostId = id;
            document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('modal-view-title').innerText = p.subject;
            document.getElementById('modal-view-content').innerText = p.content;
            const fInfo = document.getElementById('modal-file-info');
            if(p.fileName) {
                fInfo.style.display = 'block';
                fInfo.innerHTML = `<i class="fas fa-download"></i> 첨부파일 다운로드: <a href="#" onclick="alert('다운로드 시뮬레이션: ${p.fileName}')">${p.fileName}</a>`;
            } else { fInfo.style.display = 'none'; }
        }

        function deletePost() {
            if(!confirm('삭제하시겠습니까?')) return;
            saveDB(getDB().filter(i => i.id != selectedPostId));
            document.getElementById('detail-modal').style.display = 'none';
            drawBoard();
        }

        function editPost() {
            const p = getDB().find(i => i.id == selectedPostId);
            document.getElementById('detail-modal').style.display = 'none';
            document.getElementById('edit-id').value = p.id;
            document.getElementById('post-subject').value = p.subject;
            document.getElementById('post-content').value = p.content;
            showPage('write-page');
        }

        function showPage(pageId, title = '') {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(title) { currentBoard = title; document.getElementById('board-title').innerText = title; }
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            const tabs = document.querySelectorAll('.nav-tab');
            if(pageId === 'main-page') tabs[0].classList.add('active');
            if(pageId === 'member-page') { tabs[1].classList.add('active'); drawMembers(members); }
            if(currentBoard === '공지사항') tabs[2].classList.add('active');
            if(currentBoard === '학습자료') tabs[3].classList.add('active');
            if(currentBoard === '사진첩') tabs[4].classList.add('active');
            if(pageId === 'board-page') drawBoard();
            window.scrollTo(0,0);
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if(currentMonth < 1) { currentYear--; currentMonth = 12; }
            if(currentMonth > 12) { currentYear++; currentMonth = 1; }
            drawCalendar();
        }

        function drawCalendar() {
            document.getElementById('cal-month-title').innerText = `${currentYear}년 ${currentMonth}월`;
            const grid = document.getElementById('cal-grid-content');
            grid.innerHTML = '<div class="day-label">S</div><div class="day-label">M</div><div class="day-label">T</div><div class="day-label">W</div><div class="day-label">T</div><div class="day-label">F</div><div class="day-label">S</div>';
            const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth, 0).getDate();
            for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
            for(let d=1; d<=lastDate; d++) {
                const fullDate = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const event = curriculumData[fullDate];
                const div = document.createElement('div');
                if(new Date(currentYear, currentMonth - 1, d).getDay() === 1) div.className = 'monday';
                if(event) { div.classList.add('has-event'); div.onclick = () => showCurriculumDetail(fullDate); }
                div.innerText = d;
                grid.appendChild(div);
            }
        }

        function drawMembers(data) {
            const list = document.getElementById('member-list');
            document.getElementById('m-count').innerText = data.length;
            list.innerHTML = data.map(m => `<div class="m-card"><div class="m-photo"><img src="${m.name}.jpg" onerror="this.src='https://via.placeholder.com/70x90?text=준비중'"></div><div><h3 style="font-size:1.1rem; color:var(--navy);">${m.name}</h3><p style="font-size:0.85rem; color:#666;">${m.company}</p><div class="m-btns"><a href="tel:${m.phone}" class="m-btn"><i class="fas fa-phone"></i></a><a href="mailto:${m.email}" class="m-btn"><i class="fas fa-envelope"></i></a></div></div></div>`).join('');
        }

        function runSearch() {
            const val = document.getElementById('m-search').value.toLowerCase();
            drawMembers(members.filter(m => m.name.includes(val) || m.company.includes(val)));
        }

        window.onload = () => { drawCalendar(); drawMembers(members); };
    </script>
