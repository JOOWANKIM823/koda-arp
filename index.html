<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KODA ARP 12기</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #002d56; --gold: #D4AF37; --bg: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; }
        body { background: #eee; }
        .app-container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* 헤더 */
        .main-header { display: flex; justify-content: space-between; padding: 15px; border-bottom: 2px solid var(--navy); background: #fff; position: sticky; top:0; z-index:100; }
        .logo { font-weight: bold; color: var(--navy); font-size: 1.2rem; cursor: pointer; }

        /* 페이지 관리 */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* [1단계] 메인 대시보드 (배경 이미지 적용) */
        .main-visual { height: 230px; background-size: cover; background-position: center; color: #fff; text-align: center; display: flex; align-items: center; justify-content: center; position: relative; }
        .main-visual::before { content: ""; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); }
        .visual-text { position: relative; z-index: 2; }

        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; }
        .grid-item { height: 160px; position: relative; cursor: pointer; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; border: 0.5px solid rgba(255,255,255,0.2); }
        .grid-item::before { content: ""; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); }
        .grid-item i, .grid-item strong { position: relative; z-index: 2; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .grid-item i { font-size: 2.2rem; color: var(--gold); margin-bottom: 8px; }

        /* [2단계] 원우 리스트 */
        .page-title { padding: 15px; background: #f4f4f4; font-size: 1.1rem; font-weight: bold; border-bottom: 3px solid var(--navy); }
        .search-section { padding: 15px; background: #fff; border-bottom: 1px solid #eee; }
        .search-bar { background: #f1f3f5; padding: 10px 15px; border-radius: 30px; display: flex; align-items: center; border: 1px solid #ddd; }
        .search-bar input { border: none; background: none; outline: none; width: 100%; margin-left: 10px; font-size: 1rem; }
        
        .member-card { display: flex; padding: 15px; border-bottom: 1px solid #eee; align-items: center; gap: 15px; cursor: pointer; }
        .photo-area { width: 80px; height: 100px; border: 1px solid #ddd; overflow: hidden; background: #f0f0f0; }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; }
        .info-area h3 { font-size: 1.15rem; margin-bottom: 5px; letter-spacing: 2px; }
        .info-area p { font-size: 0.85rem; color: #666; }
        .icon-group i { color: #adb5bd; border: 1px solid #ddd; padding: 6px; border-radius: 50%; font-size: 0.75rem; margin-right: 5px; }

        /* [3단계] 상세 팝업 */
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #fff; margin: 10% auto; padding: 25px; width: 92%; border-radius: 12px; }
        .modal-header-box { display: flex; justify-content: space-between; border-bottom: 2px solid var(--navy); padding-bottom: 10px; margin-bottom: 20px; }
        .detail-table { width: 100%; border-collapse: collapse; }
        .detail-table th { background: #f8f9fa; padding: 10px; border: 1px solid #eee; text-align: left; font-size: 0.85rem; width: 35%; }
        .detail-table td { padding: 10px; border: 1px solid #eee; font-size: 0.85rem; }

        /* 푸터 수정 (한국디벨로퍼협회 반영) */
        .main-footer { background: #333; color: #aaa; padding: 30px 20px; text-align: center; font-size: 0.75rem; }
        .footer-info strong { color: #fff; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo" onclick="showPage('main-page')">KODA-ARP</div>
            <div class="menu-btn"><i class="fas fa-bars"></i></div>
        </header>

        <div id="main-page" class="page active">
            <section class="main-visual" style="background-image: url('Main-bg.jpg');">
                <div class="visual-text">
                    <p style="font-size:0.8rem; letter-spacing:2px;">한국디벨로퍼협회</p>
                    <h1>창조도시부동산융합<br>최고위과정(ARP)</h1>
                </div>
            </section>
            <nav class="grid-menu">
                <div class="grid-item" onclick="showPage('member-page')" style="background-image: url('thumb-member.jpg');">
                    <i class="fas fa-id-card"></i><strong>원우수첩</strong>
                </div>
                <div class="grid-item" onclick="alert('준비 중입니다.')" style="background-image: url('thumb-board.jpg');">
                    <i class="fas fa-images"></i><strong>게시판 & 사진첩</strong>
                </div>
                <div class="grid-item" onclick="alert('준비 중입니다.')" style="background-image: url('thumb-notice.jpg');">
                    <i class="fas fa-bullhorn"></i><strong>공지 및 일정</strong>
                </div>
                <div class="grid-item"><i class="fas fa-university"></i><strong>협회소개</strong></div>
            </nav>
        </div>

        <div id="member-page" class="page">
            <div class="page-title">원우회 <span>12기 리스트</span></div>
            <div class="search-section">
                <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="member-search" placeholder="성함 또는 소속 검색"></div>
            </div>
            <div id="member-list-items"></div>
        </div>

        <footer class="main-footer">
            <div class="footer-info">
                <strong>한국디벨로퍼협회(KODA) 창조도시부동산융합 최고위과정</strong><br>
                (06152) 서울시 강남구 테헤란로 305, 11층 (역삼동, 한국기술센터)<br>
                TEL: 02-512-4750 | FAX: 02-512-4752
            </div>
        </footer>
    </div>

    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header-box"><span style="font-weight:bold; color:var(--navy);">원우 상세정보</span><i class="fas fa-times" onclick="closeModal()" style="cursor:pointer;"></i></div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
