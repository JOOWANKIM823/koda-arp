<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KODA ARP 12기</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #1a2a4e; --gold: #D4AF37; --bg: #f5f5f5; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; }
        body { background: var(--bg); padding-bottom: 70px; }
        .app-container { max-width: 500px; margin: 0 auto; background: var(--white); min-height: 100vh; position: relative; }
        
        /* 헤더 */
        .main-header { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #eee; background: #fff; position: sticky; top:0; z-index:100; }
        .logo { font-weight: 800; color: var(--navy); font-size: 1.2rem; }

        .page { display: none; }
        .page.active { display: block; }

        /* 메인 검색 배너 */
        .search-banner { background: #b1b1b1; margin: 15px; border-radius: 20px; padding: 25px 20px; position: relative; height: 160px; cursor: pointer; overflow: hidden; }
        .search-banner::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 100px; background: url('https://kodaarp.kr/img/main/arp_search_img.png') no-repeat bottom center; background-size: contain; opacity: 0.8; }
        .banner-text h2 { font-size: 1.2rem; color: var(--navy); z-index: 2; position: relative; }
        .click-btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 5; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* 🚀 2026년 고정 달력 디자인 */
        .calendar-card { background: var(--navy); margin: 15px; border-radius: 20px; padding: 20px; color: #fff; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-table { width: 100%; border-collapse: collapse; text-align: center; }
        .cal-table th { font-size: 0.75rem; color: #aaa; padding-bottom: 10px; }
        .cal-table td { height: 45px; font-size: 0.9rem; cursor: pointer; position: relative; }
        .cal-table td.event::after { content: ""; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--gold); border-radius: 50%; }

        /* 🚀 게시판 스타일 강의 상세 */
        .notice-board { padding: 20px; background: #fff; }
        .board-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        .board-meta { color: #888; font-size: 0.85rem; padding-bottom: 15px; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .lecture-table { width: 100%; border-collapse: collapse; border: 1px solid #ddd; }
        .lecture-table td { border: 1px solid #ddd; padding: 12px 8px; font-size: 0.85rem; text-align: center; }
        .lecture-table .label { background: #f9f9f9; font-weight: bold; width: 25%; }

        /* 하단바 */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #888; font-size: 0.7rem; flex: 1; }
        .nav-item.active { color: var(--navy); font-weight: bold; }
        .nav-item i { font-size: 1.2rem; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo">KODA-ARP</div>
            <div class="menu-btn"><i class="fas fa-bars"></i></div>
        </header>

        <div id="main-page" class="page active">
            <div class="search-banner" onclick="showPage('member-page')">
                <div class="banner-text"><h2>ARP 원우 리스트 검색</h2></div>
                <div class="click-btn">Click</div>
            </div>

            <div class="calendar-card">
                <div class="cal-header">
                    <span style="font-size: 1.2rem; font-weight: bold;">2026.03</span>
                </div>
                <table class="cal-table">
                    <thead><tr><th>S</th><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th>S</th></tr></thead>
                    <tbody id="cal-body"></tbody>
                </table>
            </div>
        </div>

        <div id="notice-page" class="page">
            <div style="padding: 10px 20px;"><i class="fas fa-arrow-left" onclick="showPage('main-page')"></i></div>
            <div class="notice-board" id="lecture-detail">
                </div>
        </div>

        <div id="member-page" class="page">
            <div style="padding: 15px; border-bottom: 1px solid #eee;">
                <input type="text" id="m-search" placeholder="원우 검색..." oninput="searchM()" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd;">
            </div>
            <div id="member-list"></div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showPage('main-page')"><i class="fas fa-home"></i><span>홈</span></div>
            <div class="nav-item" onclick="showPage('member-page')"><i class="fas fa-id-card"></i><span>원우명단</span></div>
            <div class="nav-item" onclick="alert('준비중')"><i class="fas fa-bullhorn"></i><span>공지</span></div>
            <div class="nav-item" onclick="alert('준비중')"><i class="fas fa-file-alt"></i><span>학습자료</span></div>
            <div class="nav-item" onclick="alert('준비중')"><i class="fas fa-images"></i><span>사진첩</span></div>
        </nav>
    </div>

    <script>
        // 🚀 커리큘럼 데이터 (한글 파일 내용 기반)
        const curriculum = {
            "2026-03-16": { week: "1주차", title: "입학식", sub: "KODA 사무국", date: "2026년 03월 16일", l1: "입학식", f1: "KODA 사무국", l2: "-", f2: "-" },
            "2026-03-23": { week: "2주차", title: "미래사회를 준비하며", sub: "부동산트랜드와 주택 정책", date: "2026년 03월 23일", l1: "부동산트랜드와 주택 정책", f1: "진희선 교수", l2: "1학기 개강파티", f2: "원우회 주관" },
            "2026-03-30": { week: "3주차", title: "부동산 프로젝트 리츠 사업", sub: "김승범 과장", date: "2026년 03월 30일", l1: "부동산 프로젝트 리츠 사업", f1: "김승범 과장", l2: "제4차 산업혁명과 제4의 물결", f2: "이금룡 이사장" },
            "2026-04-06": { week: "4주차", title: "디벨로퍼의 상상력", sub: "문주현 회장", date: "2026년 04월 06일", l1: "특강(디벨로퍼의 상상력)", f1: "문주현 명예회장", l2: "-", f2: "-" },
            "2026-05-18": { week: "9주차", title: "서울시 공간구조 미래", sub: "구자훈 교수", date: "2026년 05월 18일", l1: "서울시 공간구조 미래: 과제와 전략", f1: "구자훈 교수", l2: "-", f2: "-" }
        };

        // 🚀 원우 60명 전원 데이터
        const members = Array.from({length: 60}, (_, i) => ({
            no: i + 1,
            name: ["김구현","김기현","김선철","김세훈","김승진","김시찬","김영미","김영철","김인식","김재구","김재만","김진학","김태윤","김태형","김태훈","김평","김학성","남은오","노거희","노원수","도종광","류권","맹성호","박명식","박승옥","박옥진","박준형","박홍주","방유진","백승준","송철한","심동한","안대호","양상화","오동진","오재용","우정혁","이동걸","이명화","이원석","이은","이정혁","이종원","이충한","장영은","장용서","전정은","정용재","정지융","정태희","정호경","조민호","조일훈","채지원","최상권","최재진","최태진","태원출","함경자","홍창표"][i] || `원우${i+1}`,
            company: "KODA ARP 12기",
            pos: "원우",
            phone: "010-0000-0000"
        }));

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if(pageId === 'main-page') document.querySelectorAll('.nav-item')[0].classList.add('active');
            if(pageId === 'member-page') {
                document.querySelectorAll('.nav-item')[1].classList.add('active');
                renderM(members);
            }
        }

        // 🚀 2026년 달력 생성
        function initCal() {
            const body = document.getElementById('cal-body');
            body.innerHTML = '';
            let date = 1;
            [span_1](start_span)// 2026년 3월 1일은 일요일(0)[span_1](end_span)
            for (let i = 0; i < 5; i++) {
                let row = '<tr>';
                for (let j = 0; j < 7; j++) {
                    if (date > 31) { row += '<td></td>'; }
                    else {
                        const dStr = `2026-03-${String(date).padStart(2, '0')}`;
                        const isEvent = curriculum[dStr] ? 'event' : '';
                        row += `<td class="${isEvent}" onclick="openNotice('${dStr}')">${date}</td>`;
                        date++;
                    }
                }
                body.innerHTML += row + '</tr>';
            }
        }

        function openNotice(date) {
            const data = curriculum[date];
            if(!data) return;
            const detail = document.getElementById('lecture-detail');
            detail.innerHTML = `
                <div class="board-title">${data.week} 강의</div>
                <div class="board-meta">${data.date} | KODA-ARP 사무국</div>
                <table class="lecture-table">
                    <tr><td class="label">강의일</td><td>${data.date} (${data.week})</td></tr>
                    <tr><td class="label">1교시</td><td>${data.l1}<br><b>${data.f1}</b></td></tr>
                    <tr><td class="label">2교시</td><td>${data.l2}<br><b>${data.f2}</b></td></tr>
                </table>
            `;
            showPage('notice-page');
        }

        function renderM(data) {
            const list = document.getElementById('member-list');
            list.innerHTML = data.map(m => `
                <div style="display:flex; padding:15px; border-bottom:1px solid #eee; align-items:center;">
                    <div style="width:50px; height:60px; background:#eee; border-radius:5px; margin-right:15px;"></div>
                    <div style="flex:1;">
                        <div style="font-weight:bold;">${m.name}</div>
                        <div style="font-size:0.8rem; color:#666;">${m.company} | ${m.pos}</div>
                    </div>
                    <a href="tel:${m.phone}" style="color:var(--navy);"><i class="fas fa-phone"></i></a>
                </div>
            `).join('');
        }

        window.onload = initCal;
    </script>
</body>
</html>
